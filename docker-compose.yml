 version: '3.8'
services:
  mongo:
    image: mongo:6
    ports: ["27017:27017"]
    volumes: ['./mongo-data:/data/db']
  
  backend:
    build: ./backend
    ports: ["3000:3000"]
    depends_on: [mongo]
    volumes: ['./backend:/app']
    environment:
      - JWT_SECRET=wrl-secret-2026
      - MONGODB_URI=mongodb://mongo:27017/wrl
  
  frontend:
    image: nginx:alpine
    ports: ["80:80"]
    volumes: 
      - ./frontend:/usr/share/nginx/html:ro
    depends_on: [backend]
